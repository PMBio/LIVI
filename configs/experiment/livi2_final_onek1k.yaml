# @package _global_

# to execute this experiment run:
# python src/train.py experiment=livi2_final_onek1k

defaults:
  - override /model: livi2_final_onek1k.yaml
  - override /datamodule: onek1k.yaml
  - override /callbacks: default_livi2.yaml
  - override /trainer: default.yaml
  - override /paths: pc007_trainable-A.yaml
  - override /logger: tensorboard.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

trainer:
  max_epochs: 1000
  min_epochs: 320 # train genetic effects at least for 200 epochs
  accelerator: gpu
  devices: [0]
  logger: True
  enable_checkpointing: True
  # fast_dev_run: 3
  deterministic: True

callbacks:
  livi_checkpoint:
    filename: "LIVI2_onek1k_HVG-HEX_{epoch:04d}_{hp_metric:.5f}"

# task_name: final_zdim15-Softmax_500-gxc_5-persistent_90-0-30-warmup_adversary-weight-100_l1-vector-1e-3_l1-vector-A-1e-3_lr-8e-4_HydraNew_A-Normal-init_retrain-total-count
task_name: LIVI_covariates_test

seed: 50
