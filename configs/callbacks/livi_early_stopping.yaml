# Monitor (training) loss and stop training when it stops improving.
livi_early_stopping:
  _target_: src.callbacks.livi_early_stopping.LIVI_EarlyStopping
  monitor: "hp_metric" # quantity to be monitored, must be specified !!!
  min_delta: 1e-5 # minimum change in the monitored quantity to qualify as an improvement
  patience: 20 # number of checks with no improvement after which training will be stopped
  verbose: False # verbosity mode
  strict: True # whether to crash the training if monitor is not found in the validation metrics
  stopping_threshold: null # stop training immediately once the monitored quantity reaches this threshold
  divergence_threshold: null # stop training as soon as the monitored quantity becomes worse than this threshold
  check_on_train_epoch_end: True # whether to run early stopping at the end of the training epoch
  log_rank_zero_only: False  # this keyword argument isn't available in stable version
