defaults:
  - model_checkpoint.yaml
  - early_stopping.yaml
  - model_summary.yaml
  - device_monitor.yaml
  - rich_progress_bar.yaml
  - _self_

model_checkpoint:
  dirpath: ${paths.output_dir}/checkpoints
  filename: "epoch_{epoch:04d}"
  monitor: "hp_metric"
  mode: "min"
  save_last: true
  auto_insert_metric_name: False

model_summary:
  max_depth: -1
